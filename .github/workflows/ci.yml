name: RoofLeadHQ CI

on:
  push:
    branches: [master, main]
  pull_request:
    branches: [master, main]

jobs:
  validate:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Validate master-config.json
        run: |
          echo "Validating master-config.json structure..."
          python3 scripts/validate-config.py

      - name: Check pipeline files exist
        run: |
          echo "Checking all referenced pipelines exist..."
          python3 -c '
          import json
          import os
          with open("master-config.json") as f:
              config = json.load(f)
          missing = []
          for name, path in config.get("pipelines", {}).items():
              if not os.path.exists(path):
                  missing.append(path)
                  print(f"WARNING: Missing pipeline: {path}")
              else:
                  print(f"OK: Found {path}")
          if missing:
              print(f"Pipeline check completed with {len(missing)} missing files")
          else:
              print("All pipelines present")
          '