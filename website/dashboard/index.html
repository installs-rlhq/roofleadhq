<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>RoofLeadHQ Dashboard</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="/styles.css">
</head>
<body class="bg-gray-50 font-sans">
    <div class="max-w-7xl mx-auto p-6">
        <!-- Navy Header -->
        <div class="bg-navy-900 text-white rounded-2xl p-6 flex justify-between items-center">
            <h1 class="text-3xl font-bold">RoofLeadHQ Dashboard</h1>
            <div class="text-sm">Last updated: <span id="last-updated">Just now</span></div>
        </div>

        <!-- Metrics Grid -->
        <div class="grid grid-cols-1 md:grid-cols-3 gap-6 mt-8">
            <div class="bg-white rounded-2xl p-6 shadow-sm">
                <p class="text-sm text-gray-500">Total Leads • Today</p>
                <p class="text-5xl font-semibold mt-2">23</p>
                <p class="text-green-600 text-sm mt-1">↑ 4 from yesterday</p>
            </div>
            <div class="bg-white rounded-2xl p-6 shadow-sm">
                <p class="text-sm text-gray-500">This Month</p>
                <p class="text-5xl font-semibold mt-2">142</p>
                <p class="text-green-600 text-sm mt-1">↑ 18% from last month</p>
            </div>
            <div class="bg-white rounded-2xl p-6 shadow-sm">
                <p class="text-sm text-gray-500">Conversion Rate</p>
                <p class="text-5xl font-semibold mt-2">31%</p>
                <p class="text-green-600 text-sm mt-1">↑ 3% from last week</p>
            </div>
        </div>

        <!-- Leads Needing Attention -->
        <div class="mt-10">
            <h2 class="text-xl font-semibold mb-4">Leads Needing Attention</h2>
            <div class="bg-white rounded-2xl overflow-hidden">
                <table class="w-full">
                    <tr class="border-b"><td class="p-4">John Smith</td><td class="p-4 text-amber-600">New Lead • 5 days open</td></tr>
                    <tr class="border-b"><td class="p-4">Sarah Johnson</td><td class="p-4 text-red-600">Follow-up Needed • 12 days open</td></tr>
                </table>
            </div>
        </div>

        <div class="mt-6 text-center">
            <a href="/" class="text-blue-600 hover:underline">← Back to Reports</a>
        </div>
    </div>
</body>
</html>
