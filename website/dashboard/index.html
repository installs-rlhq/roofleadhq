<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Dashboard Overview • RoofLeadHQ</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
    <style>
        body { font-family: system-ui, -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif; }
        .metric-card { transition: transform 0.2s ease, box-shadow 0.2s ease; }
        .metric-card:hover { transform: translateY(-2px); box-shadow: 0 10px 15px -3px rgb(0 0 0 / 0.1); }
        .navy-header { background: #1e3a8a; }
    </style>
</head>
<body class="bg-slate-50">
    <!-- Header -->
    <div class="navy-header text-white">
        <div class="max-w-7xl mx-auto px-6 py-5 flex items-center justify-between">
            <div class="flex items-center gap-x-3">
                <a href="https://roofleadhq.com" class="flex items-center gap-x-2">
                    <img src="https://www.roofleadhq.com/roofleadhq-logo.jpeg" alt="RoofLeadHQ" class="h-9 w-auto">
                </a>
                <div>
                    <span class="font-semibold text-2xl">Dashboard Overview</span>
                </div>
            </div>
            
            <div class="flex items-center gap-x-4 text-sm">
                <div class="text-right">
                    <div class="text-xs text-blue-200">Last updated</div>
                    <div id="last-updated" class="font-medium"></div>
                </div>
                <a href="https://roofleadhq.com" 
                   class="flex items-center gap-x-2 px-4 py-2 bg-white/10 hover:bg-white/20 rounded-xl text-sm font-medium transition">
                    <i class="fa-solid fa-arrow-left"></i>
                    <span>Back to Reports</span>
                </a>
            </div>
        </div>
    </div>

    <div class="max-w-7xl mx-auto px-6 py-8">
        
        <!-- Greeting -->
        <div class="mb-8">
            <h1 class="text-3xl font-semibold text-slate-900">Good morning, Jason</h1>
            <p class="text-slate-600 mt-1">Here's what's happening with your leads today.</p>
        </div>

        <!-- Metrics 3x3 Grid -->
        <div class="grid grid-cols-1 md:grid-cols-3 gap-4 mb-10" id="metrics-grid">
            <!-- Populated by JavaScript -->
        </div>

        <!-- Leads Needing Attention -->
        <div class="mb-10">
            <div class="flex items-center justify-between mb-4">
                <h2 class="text-xl font-semibold text-slate-900">Leads Needing Attention</h2>
                <a href="#" class="text-sm text-blue-600 hover:text-blue-700 flex items-center gap-x-1">
                    View all <i class="fa-solid fa-arrow-right fa-sm"></i>
                </a>
            </div>

            <div class="bg-white rounded-2xl border shadow-sm overflow-hidden">
                <table class="w-full">
                    <thead>
                        <tr class="border-b bg-slate-50">
                            <th class="text-left px-6 py-3 text-xs font-medium text-slate-500">Lead</th>
                            <th class="text-left px-4 py-3 text-xs font-medium text-slate-500">Source</th>
                            <th class="text-left px-4 py-3 text-xs font-medium text-slate-500">Status</th>
                            <th class="text-left px-4 py-3 text-xs font-medium text-slate-500">Last Activity</th>
                            <th class="text-left px-6 py-3 text-xs font-medium text-slate-500">Action</th>
                        </tr>
                    </thead>
                    <tbody id="leads-table-body" class="divide-y text-sm">
                        <!-- Populated by JavaScript -->
                    </tbody>
                </table>
            </div>
        </div>

        <!-- Top Lead Sources + Recommended Actions -->
        <div class="grid lg:grid-cols-2 gap-6">
            
            <!-- Top Lead Sources -->
            <div class="bg-white border rounded-2xl p-6">
                <h3 class="font-semibold text-lg mb-4">Top Lead Sources</h3>
                <div id="top-sources" class="space-y-3">
                    <!-- Populated by JavaScript -->
                </div>
            </div>

            <!-- Recommended Actions -->
            <div class="bg-white border rounded-2xl p-6">
                <h3 class="font-semibold text-lg mb-4">Recommended Actions</h3>
                <div class="text-slate-600 text-sm leading-relaxed" id="recommended-actions">
                    <!-- Populated by JavaScript -->
                </div>
            </div>
        </div>

        <!-- Manual Outreach -->
        <div class="mt-8 bg-white border rounded-2xl p-6">
            <h3 class="font-semibold text-lg mb-4">Manual Outreach</h3>
            <div class="flex gap-4">
                <button onclick="alert('Send Message modal opening...')" 
                        class="flex-1 py-3 bg-emerald-600 hover:bg-emerald-700 text-white font-semibold rounded-2xl transition">
                    <i class="fa-solid fa-comment-dots mr-2"></i> Send Message
                </button>
                <button onclick="alert('Phone Call modal opening...')" 
                        class="flex-1 py-3 bg-blue-600 hover:bg-blue-700 text-white font-semibold rounded-2xl transition">
                    <i class="fa-solid fa-phone mr-2"></i> Phone Call
                </button>
            </div>
        </div>

        <!-- CTA -->
        <div class="mt-10 text-center">
            <a href="#" 
               class="inline-flex items-center justify-center bg-emerald-600 hover:bg-emerald-700 text-white font-semibold px-8 py-4 rounded-2xl text-lg transition">
                Open Full Dashboard →
            </a>
        </div>
    </div>

    <script>
        // Demo Data Object - Growth tier (~275 leads/month)
        const dashboardData = {
            lastUpdated: new Date().toLocaleTimeString([], { hour: '2-digit', minute: '2-digit' }),
            metrics: [
                { label: "Total Leads", value: "9", trend: "↑3", color: "#10b981", period: "Today" },
                { label: "Appointments", value: "3", trend: "↓1", color: "#ef4444", period: "Today" },
                { label: "Manual Leads", value: "4", trend: "↑2", color: "#10b981", period: "Today" },
                { label: "Total Leads", value: "278", trend: "↑12", color: "#10b981", period: "This Month" },
                { label: "Close Rate", value: "34%", trend: "↑5%", color: "#10b981", period: "This Month" },
                { label: "Avg Response", value: "42m", trend: "↓9m", color: "#10b981", period: "This Month" }
            ],
            leads: [
                { name: "Sarah M.", phone: "+17205551234", source: "Website", status: "Hot", statusColor: "#fee2e2", textColor: "#991b1b", last: "2h ago" },
                { name: "Mike R.", phone: "+13035559876", source: "Facebook", status: "New", statusColor: "#f1f5f9", textColor: "#000000", last: "5h ago" },
                { name: "Lisa K.", phone: "+17205554321", source: "Direct Calls", status: "Stale", statusColor: "#fefce8", textColor: "#000000", last: "48h ago" }
            ],
            topSources: [
                { source: "Website", count: 112 },
                { source: "Google Business", count: 67 },
                { source: "Facebook", count: 48 },
                { source: "Direct Calls", count: 31 },
                { source: "Google Ads", count: 14 },
                { source: "Email", count: 6 }
            ],
            recommendedActions: "Focus follow-up on the 3 hot leads today.<br>Consider tightening the 24-hour response window this week."
        };

        function initDashboard() {
            // Last Updated
            document.getElementById('last-updated').textContent = dashboardData.lastUpdated;

            // Metrics 3x3 Grid
            const metricsContainer = document.getElementById('metrics-grid');
            metricsContainer.innerHTML = '';
            dashboardData.metrics.forEach(m => {
                const card = document.createElement('div');
                card.className = 'metric-card bg-white border rounded-2xl p-5 cursor-pointer';
                card.innerHTML = `
                    <div class="text-xs text-slate-500">${m.period}</div>
                    <div class="text-3xl font-semibold text-slate-900 mt-1">${m.value}</div>
                    <div class="flex items-center justify-between mt-3">
                        <div class="text-sm text-slate-600">${m.label}</div>
                        <div class="text-xs" style="color: ${m.color}">${m.trend}</div>
                    </div>
                `;
                card.onclick = () => alert(`Filtering by ${m.label} coming soon`);
                metricsContainer.appendChild(card);
            });

            // Leads Table
            const leadsBody = document.getElementById('leads-table-body');
            leadsBody.innerHTML = '';
            dashboardData.leads.forEach(lead => {
                const row = document.createElement('tr');
                row.className = 'hover:bg-slate-50';
                row.innerHTML = `
                    <td class="px-6 py-4">
                        <div class="font-medium">${lead.name}</div>
                        <div class="text-xs text-slate-500">${lead.phone}</div>
                    </td>
                    <td class="px-4 py-4 text-sm text-slate-600">${lead.source}</td>
                    <td class="px-4 py-4">
                        <span class="px-3 py-0.5 text-xs rounded-full" style="background: ${lead.statusColor}; color: ${lead.textColor}">
                            ${lead.status}
                        </span>
                    </td>
                    <td class="px-4 py-4 text-sm text-slate-500">${lead.last}</td>
                    <td class="px-6 py-4">
                        <button onclick="alert('Outreach modal opening...')" 
                                class="text-xs px-3 py-1 bg-emerald-600 text-white rounded-lg hover:bg-emerald-700">
                            Outreach
                        </button>
                    </td>
                `;
                leadsBody.appendChild(row);
            });

            // Top Sources
            const sourcesContainer = document.getElementById('top-sources');
            sourcesContainer.innerHTML = '';
            dashboardData.topSources.forEach(s => {
                const div = document.createElement('div');
                div.className = 'flex justify-between text-sm';
                div.innerHTML = `
                    <span>${s.source}</span>
                    <span class="font-semibold">${s.count} leads</span>
                `;
                sourcesContainer.appendChild(div);
            });

            // Recommended Actions
            document.getElementById('recommended-actions').innerHTML = dashboardData.recommendedActions;
        }

        window.onload = initDashboard;
    </script>
</body>
</html>
